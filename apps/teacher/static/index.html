<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Teacher — Socratic Tutor</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/styles/github-dark.min.css">
<style>
  :root {
    --bg: #1a1b26;
    --panel: #24283b;
    --panel-2: #2a2e42;
    --text: #c0caf5;
    --text-dim: #9aa5ce;
    --accent: #7aa2f7;
    --accent-2: #bb9af7;
    --user: #1f4068;
    --teacher: #2a2e42;
    --border: #414868;
    --danger: #f7768e;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.55;
    display: flex;
    flex-direction: column;
  }
  header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; }
  header h1 span { color: var(--accent); }
  .controls { display: flex; gap: 8px; align-items: center; }
  select, button {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
  }
  select:hover, button:hover { background: var(--border); }
  button.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }
  button.primary:hover { background: var(--accent-2); border-color: var(--accent-2); }
  button.danger { color: var(--danger); border-color: var(--danger); background: transparent; }
  button.danger:hover { background: var(--danger); color: var(--bg); }

  main {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .chat { width: 100%; max-width: 820px; display: flex; flex-direction: column; gap: 16px; }
  .empty {
    color: var(--text-dim);
    text-align: center;
    padding: 64px 16px;
    font-size: 15px;
  }
  .empty kbd {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 6px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 13px;
  }
  .empty .examples { margin-top: 16px; display: grid; gap: 8px; max-width: 480px; margin-left: auto; margin-right: auto; }
  .empty .example {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    cursor: pointer;
    text-align: left;
    color: var(--text);
    font-size: 14px;
  }
  .empty .example:hover { border-color: var(--accent); }

  .msg {
    background: var(--teacher);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    overflow-x: auto;
  }
  .msg.user { background: var(--user); border-color: #2c4a78; }
  .msg .role {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .msg.user .role { color: #93b6f0; }
  .msg .body { font-size: 15px; }
  .msg .body p:first-child { margin-top: 0; }
  .msg .body p:last-child { margin-bottom: 0; }
  .msg .body h1, .msg .body h2, .msg .body h3, .msg .body h4 {
    margin-top: 1em;
    margin-bottom: 0.4em;
    color: var(--text);
  }
  .msg .body h1 { font-size: 1.4em; }
  .msg .body h2 { font-size: 1.2em; }
  .msg .body h3 { font-size: 1.1em; }
  .msg .body code {
    background: var(--bg);
    padding: 2px 5px;
    border-radius: 4px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 0.9em;
  }
  .msg .body pre {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    overflow-x: auto;
    font-size: 0.88em;
  }
  .msg .body pre code { background: none; padding: 0; font-size: inherit; }
  .msg .body blockquote {
    border-left: 3px solid var(--accent);
    margin: 0.6em 0;
    padding: 0.2em 0 0.2em 14px;
    color: var(--text-dim);
    background: rgba(122,162,247,0.05);
    border-radius: 0 6px 6px 0;
  }
  .msg .body table { border-collapse: collapse; margin: 0.6em 0; font-size: 0.95em; }
  .msg .body th, .msg .body td {
    border: 1px solid var(--border);
    padding: 5px 10px;
    text-align: left;
  }
  .msg .body th { background: var(--panel); }
  .msg .body ul, .msg .body ol { padding-left: 24px; }
  .msg .body a { color: var(--accent); text-decoration: none; }
  .msg .body a:hover { text-decoration: underline; }
  .msg .actions {
    display: flex; gap: 6px;
  }
  .msg .actions button {
    font-size: 12px;
    padding: 3px 8px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .msg .actions button:hover { background: var(--panel-2); color: var(--text); }
  .msg .actions .copied { color: var(--accent); border-color: var(--accent); }

  footer {
    border-top: 1px solid var(--border);
    background: var(--panel);
    padding: 14px 20px;
    display: flex;
    justify-content: center;
  }
  form {
    width: 100%;
    max-width: 820px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  textarea {
    flex: 1;
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 15px;
    font-family: inherit;
    resize: vertical;
    min-height: 56px;
    max-height: 240px;
  }
  textarea:focus { outline: none; border-color: var(--accent); }

  .status {
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
    padding: 4px 8px;
    min-height: 20px;
  }
  .status.error { color: var(--danger); }
  .typing {
    color: var(--text-dim);
    font-style: italic;
    padding: 12px 18px;
  }
  .typing::after {
    content: "▍";
    animation: blink 1s infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>
<header>
  <h1><span>Teacher</span> — Socratic Tutor</h1>
  <div class="controls">
    <select id="model" title="Model selection">
      <option value="claude-sonnet-4-6">Sonnet 4.6 (fast)</option>
      <option value="claude-opus-4-7">Opus 4.7 (deep)</option>
      <option value="claude-haiku-4-5-20251001">Haiku 4.5 (cheap)</option>
    </select>
    <button id="newChat" class="danger" title="Clear conversation">New chat</button>
  </div>
</header>

<main>
  <div id="chat" class="chat"></div>
</main>

<div class="status" id="status"></div>

<footer>
  <form id="form">
    <textarea id="input" placeholder='Ask: e.g. "teach me belief propagation" or "quiz me on bias-variance tradeoff". Cmd/Ctrl+Enter to send.'></textarea>
    <button type="submit" class="primary" id="sendBtn">Send</button>
  </form>
</footer>

<script src="https://cdn.jsdelivr.net/npm/marked@13.0.3/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" integrity="sha384-43gviWU0YVjaDtb/GhzOouOXtZMP/7XUzwPTstBeZFe/+rCMvRwr4yROQP43s0Xk" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/index.min.js"></script>
<script>
const STORAGE_KEY = "teacher.history.v1";
const MODEL_KEY = "teacher.model.v1";

const chatEl = document.getElementById("chat");
const formEl = document.getElementById("form");
const inputEl = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");
const statusEl = document.getElementById("status");
const modelEl = document.getElementById("model");
const newChatEl = document.getElementById("newChat");

let history = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
modelEl.value = localStorage.getItem(MODEL_KEY) || "claude-sonnet-4-6";

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c]);
}

function renderMarkdown(text) {
  // Configure marked once
  if (!window.__markedConfigured) {
    marked.setOptions({
      breaks: true,
      gfm: true,
      highlight: (code, lang) => {
        if (lang && hljs.getLanguage(lang)) {
          try { return hljs.highlight(code, { language: lang }).value; } catch (_) {}
        }
        try { return hljs.highlightAuto(code).value; } catch (_) { return escapeHtml(code); }
      },
    });
    window.__markedConfigured = true;
  }
  return marked.parse(text);
}

function renderEmpty() {
  chatEl.innerHTML = `
    <div class="empty">
      <div>Ask Teacher to teach you something. The persona refuses to just give you the answer — it'll ask Socratic questions and force you to think.</div>
      <div style="margin-top:18px">Tip: <kbd>Cmd</kbd>+<kbd>Enter</kbd> to send.</div>
      <div class="examples">
        <button class="example" data-prompt="teach me belief propagation, with a worked example for a tiny LDPC code">teach me belief propagation, with a worked example for a tiny LDPC code</button>
        <button class="example" data-prompt="quiz me on the bias-variance tradeoff at the level of someone who's read Prince Ch 6">quiz me on the bias-variance tradeoff at the level of someone who's read Prince Ch 6</button>
        <button class="example" data-prompt="help me derive the cross-entropy gradient for softmax + multiclass classification">help me derive the cross-entropy gradient for softmax + multiclass classification</button>
        <button class="example" data-prompt="teach me what mmWave-MIMO sparsity means and why blockage matters">teach me what mmWave-MIMO sparsity means and why blockage matters</button>
      </div>
    </div>
  `;
  chatEl.querySelectorAll(".example").forEach(btn => {
    btn.addEventListener("click", () => {
      inputEl.value = btn.dataset.prompt;
      inputEl.focus();
    });
  });
}

function renderAll() {
  if (!history.length) { renderEmpty(); return; }
  chatEl.innerHTML = "";
  history.forEach((m, i) => chatEl.appendChild(messageNode(m, i)));
  // KaTeX auto-render across the whole pane (handles $...$ and $$...$$)
  renderMathInElement(chatEl, {
    delimiters: [
      {left: "$$", right: "$$", display: true},
      {left: "$", right: "$", display: false},
      {left: "\\(", right: "\\)", display: false},
      {left: "\\[", right: "\\]", display: true},
    ],
    throwOnError: false,
  });
  // Scroll to bottom
  chatEl.parentElement.scrollTop = chatEl.parentElement.scrollHeight;
}

function messageNode(m, i) {
  const node = document.createElement("div");
  node.className = `msg ${m.role}`;
  const role = document.createElement("div");
  role.className = "role";
  const label = document.createElement("span");
  label.textContent = m.role === "user" ? "You" : "Teacher";
  role.appendChild(label);

  // Actions for assistant messages
  if (m.role === "assistant") {
    const actions = document.createElement("div");
    actions.className = "actions";
    const copyBtn = document.createElement("button");
    copyBtn.textContent = "Copy";
    copyBtn.addEventListener("click", () => {
      navigator.clipboard.writeText(m.content);
      copyBtn.textContent = "Copied!";
      copyBtn.classList.add("copied");
      setTimeout(() => { copyBtn.textContent = "Copy"; copyBtn.classList.remove("copied"); }, 1200);
    });
    const wikiBtn = document.createElement("button");
    wikiBtn.textContent = "Save→wiki";
    wikiBtn.title = "Copy a Markdown-formatted attempt block ready to paste into wiki/practice/ or wiki/mistakes/";
    wikiBtn.addEventListener("click", () => {
      // Pull the user message right before this assistant message as context
      const userPrev = history.slice(0, i).reverse().find(x => x.role === "user");
      const date = new Date().toISOString().slice(0,10);
      const block = `## Teacher session — ${date}\n\n` +
        (userPrev ? `**Prompt:** ${userPrev.content}\n\n` : "") +
        `**Teacher:**\n\n${m.content}\n`;
      navigator.clipboard.writeText(block);
      wikiBtn.textContent = "Copied!";
      wikiBtn.classList.add("copied");
      setTimeout(() => { wikiBtn.textContent = "Save→wiki"; wikiBtn.classList.remove("copied"); }, 1500);
    });
    actions.appendChild(copyBtn);
    actions.appendChild(wikiBtn);
    role.appendChild(actions);
  }

  const body = document.createElement("div");
  body.className = "body";
  if (m.role === "user") {
    body.innerHTML = renderMarkdown(m.content);
  } else {
    body.innerHTML = renderMarkdown(m.content);
  }
  node.appendChild(role);
  node.appendChild(body);
  return node;
}

async function send(text) {
  if (!text.trim()) return;
  history.push({ role: "user", content: text });
  save();
  renderAll();

  inputEl.value = "";
  inputEl.style.height = "auto";

  // Typing indicator
  const typing = document.createElement("div");
  typing.className = "msg assistant";
  typing.innerHTML = '<div class="role"><span>Teacher</span></div><div class="typing">thinking</div>';
  chatEl.appendChild(typing);
  chatEl.parentElement.scrollTop = chatEl.parentElement.scrollHeight;

  sendBtn.disabled = true;
  statusEl.textContent = "";
  statusEl.className = "status";

  try {
    const resp = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: history, model: modelEl.value }),
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ detail: resp.statusText }));
      throw new Error(err.detail || resp.statusText);
    }
    const data = await resp.json();
    history.push({ role: "assistant", content: data.content });
    save();
    renderAll();
    const u = data.usage || {};
    const cached = u.cache_read_input_tokens || 0;
    statusEl.textContent =
      `${data.model} · in ${u.input_tokens}${cached ? ` (${cached} cached)` : ""} · out ${u.output_tokens}`;
  } catch (e) {
    typing.remove();
    statusEl.className = "status error";
    statusEl.textContent = `Error: ${e.message}`;
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

formEl.addEventListener("submit", e => {
  e.preventDefault();
  send(inputEl.value);
});

inputEl.addEventListener("keydown", e => {
  if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
    e.preventDefault();
    send(inputEl.value);
  }
});

inputEl.addEventListener("input", () => {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 240) + "px";
});

newChatEl.addEventListener("click", () => {
  if (history.length === 0 || confirm("Clear the current conversation?")) {
    history = [];
    save();
    renderAll();
    statusEl.textContent = "";
  }
});

modelEl.addEventListener("change", () => {
  localStorage.setItem(MODEL_KEY, modelEl.value);
});

renderAll();
inputEl.focus();
</script>
</body>
</html>
